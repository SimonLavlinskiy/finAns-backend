name: CI

on:
  push:
    branches: [main, features/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finans
          POSTGRES_PASSWORD: finans
          POSTGRES_DB: finans
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finans -d finans"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install tools
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Tidy modules
        run: go mod tidy

      - name: sqlc generate
        run: sqlc generate

      - name: Lint
        run: golangci-lint run ./...

      - name: Migrate
        env:
          DATABASE_URL: postgres://finans:finans@localhost:5432/finans?sslmode=disable
        run: go run ./cmd/migrate -direction up

      - name: Test
        env:
          DATABASE_URL: postgres://finans:finans@localhost:5432/finans?sslmode=disable
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Build
        run: go build -o bin/finans-api ./cmd/app
