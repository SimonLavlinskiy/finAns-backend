services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finans
      POSTGRES_PASSWORD: finans
      POSTGRES_DB: finans
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finans -d finans"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://finans:finans@postgres:5432/finans?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
